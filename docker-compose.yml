services:
  postgres_user:
    image: postgres:16-alpine
    container_name: yapp-postgres-auth
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres_message:
    image: postgres:16-alpine
    container_name: yapp-postgres-message
    environment:
      POSTGRES_USER: ${POSTGRES_MESSAGE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB2}
    ports:
      - "5434:5432"
    volumes:
      - postgres_message_data:/var/lib/postgresql/data

  postgres_media:
    image: postgres:16-alpine
    container_name: yapp-postgres-media
    environment:
      POSTGRES_USER: ${POSTGRES_MEDIA}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB3}
    ports:
      - "5435:5432"
    volumes:
      - postgres_media_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: yapp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

volumes:
  postgres_auth_data:
  postgres_message_data:
  postgres_media_data:
